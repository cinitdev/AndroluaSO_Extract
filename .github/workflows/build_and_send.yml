# Workflow 名称
name: Build AndroLua Pro SO and Send to Telegram

on:
  # 允许手动触发 Workflow
  workflow_dispatch:
    inputs:
      so_files_list:
        description: '输入要提取的SO文件名 (用|隔开)'
        required: true
        default: 'libluajava.so' # 默认提取的文件
  
  # 当有代码推送到 main 分支时自动触发
  push:
    branches:
      - main

env:
  # 压缩包的名称
  ZIP_NAME: "compiled-so-files.zip"

jobs:
  build-and-deploy:
    # 使用最新的 Ubuntu 系统
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1: 检出你自己的项目代码
      - name: 1. Checkout Your Project
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 步骤 2: 设置 Java 环境为 JDK 17
      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 步骤 3: 安装 Android SDK 和 NDK
      - name: 3. Setup Android SDK
        uses: android-actions/setup-sdk@v3
        with:
          ndk-version: "28.0.12433566"

      # 步骤 4: 为 gradlew 脚本添加执行权限
      - name: 4. Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      # 步骤 5: 使用 Gradle Wrapper 编译项目
      - name: 5. Build Project with Gradle
        run: ./gradlew assembleDebug

      # 步骤 6: 【重大修改】提取SO文件并记录成功与失败的列表
      - name: 6. Extract SO Files and Record Results
        run: |
          # 查找编译产物 APK
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" -type f)
          if [[ -z "$APK_PATH" ]]; then
            echo "::error::编译后找不到 APK 文件！"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"

          # 创建用于存放 SO 文件的目录
          mkdir -p extracted_so/lib/arm64-v8a
          mkdir -p extracted_so/lib/armeabi-v7a
          
          # 获取用户输入并格式化 (将'|'替换为空格)
          SO_FILES_INPUT="${{ github.event.inputs.so_files_list || 'libluajava.so' }}"
          FORMATTED_LIST=$(echo "$SO_FILES_INPUT" | tr '|' ' ')
          echo "REQUESTED_FILES_FORMATTED=$FORMATTED_LIST" >> $GITHUB_ENV

          # 初始化失败文件列表
          FAILED_FILES_LIST=""
          
          echo "开始处理请求的文件: $FORMATTED_LIST"
          for so_file in $FORMATTED_LIST; do
            # 使用 unzip -l 和 grep 在不解压的情况下检查文件是否存在
            if unzip -l "$APK_PATH" | grep -q "lib/arm64-v8a/$so_file" || unzip -l "$APK_PATH" | grep -q "lib/armeabi-v7a/$so_file"; then
              echo "找到并提取 '$so_file'..."
              # 从两个可能的目录中提取文件，忽略其中一个可能不存在的错误
              unzip -j "$APK_PATH" "lib/arm64-v8a/$so_file" -d extracted_so/lib/arm64-v8a 2>/dev/null || true
              unzip -j "$APK_PATH" "lib/armeabi-v7a/$so_file" -d extracted_so/lib/armeabi-v7a 2>/dev/null || true
            else
              echo "::warning::在 APK 中找不到 '$so_file'。"
              # 如果文件不存在，则将其添加到失败列表
              FAILED_FILES_LIST="$FAILED_FILES_LIST $so_file"
            fi
          done
          
          # 清理失败列表字符串前后的空格，并将其导出到环境变量
          FAILED_FILES_TRIMMED=$(echo "$FAILED_FILES_LIST" | sed 's/^ *//g' | sed 's/ *$//g')
          echo "FAILED_FILES=$FAILED_FILES_TRIMMED" >> $GITHUB_ENV

      # 步骤 7: 将提取出的 SO 文件压缩成 ZIP 包
      - name: 7. Compress Extracted SO Files
        run: |
          cd extracted_so
          zip -r ../${{ env.ZIP_NAME }} .
          cd ..
          echo "Compressed files into ${{ env.ZIP_NAME }}"

      # 步骤 8: 【重大修改】构造动态消息并发送到 Telegram
      - name: 8. Send Compressed File to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # 将消息作为文件的说明文字（Caption），实现消息和文件合并发送
          message: |
            AndroLua Pro SO 编译完成！
            项目: ${{ github.repository }}
            提取文件: ${{ env.REQUESTED_FILES_FORMATTED }}
            ${{ env.FAILED_FILES != '' && format('提取失败: {0}', env.FAILED_FILES) || '' }}
          document: ${{ env.ZIP_NAME }}
